name: Deploy Seguridad API to Azure

env:
  AZURE_WEBAPP_NAME:         APISeguridadSebasR
  AZURE_WEBAPP_PACKAGE_PATH: './Seguridad/Seguridad.API/API'
  DOTNET_VERSION:            '8.0'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Seguridad/Seguridad.API/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: 'Production-Database'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Forzar Configuración de NuGet (Como en HelloWorld)
        run: |
          cd "Seguridad/Seguridad.API"
          # Creamos un config limpio que no herede errores de carpetas locales
          echo "<?xml version='1.0' encoding='utf-8'?>
          <configuration>
            <packageSources>
              <clear />
              <add key='github' value='https://nuget.pkg.github.com/SC-701/index.json' />
              <add key='nuget.org' value='https://api.nuget.org/v3/index.json' />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key='Username' value='${{ github.actor }}' />
                <add key='Password' value='${{ secrets.PAQUETESTOKEN }}' />
              </github>
            </packageSourceCredentials>
          </configuration>" > nuget.config

      - name: Restaurar dependencias
        run: |
          cd "Seguridad/Seguridad.API"
          # Usamos el config que acabamos de crear para que no use rutas viejas
          dotnet restore "API/API.csproj" --configfile nuget.config

      - name: Compilar
        run: |
          cd "Seguridad/Seguridad.API"
          dotnet build "API/API.csproj" --configuration Release --no-restore

      - name: Publicar (dotnet publish)
        run: |
          cd "Seguridad/Seguridad.API"
          dotnet publish "API/API.csproj" \
            --configuration Release \
            --no-build \
            --output ./publish

      - name: Deploy a Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_SEGURIDAD }}
          package:         './Seguridad/Seguridad.API/publish'